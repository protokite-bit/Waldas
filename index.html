<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Financial Record</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#cfefff" />
  <link rel="manifest" href="manifest.webmanifest"> 
  <style>
    :root{ --bg:#cfefff; --card:#fff; --line:#b7c4cf; --sum:#fffb8f; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);display:grid;place-items:start center;min-height:100dvh;padding:12px}
    .app{width:min(100%,820px)}
    header{text-align:center;margin-bottom:8px}
    h1{margin:0;font-size:1.4rem}
    .toolbar{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
    button{background:#fff;border:1.5px solid #000;border-radius:6px;padding:10px 14px;min-height:44px;min-width:44px}
    .table{background:#fff;border:1.5px solid #000;border-radius:6px;overflow:hidden}
    .thead,.row{display:grid;grid-template-columns:1.5fr .9fr .9fr}
    .thead{background:#eef6ff;font-weight:600}
    .cell{border-right:1px solid #b7c4cf;border-bottom:1px solid #b7c4cf;padding:10px;display:flex;align-items:center}
    .thead .cell{border-bottom:1.5px solid #000}
    .cell:last-child{border-right:none}
    input[type=text],input[type=number]{width:100%;border:none;outline:none;background:transparent;font-size:1rem;padding:4px 0}
    input[type=number]{text-align:right}
    .date-text{width:100%;font-size:1rem;opacity:.9}
    .foot{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:#fff;padding:10px;border:1.5px solid #000;border-top:none;border-radius:0 0 6px 6px}
    .sum{width:160px;border:1.5px solid #000;border-radius:4px;background:#fffb8f;padding:10px 12px;text-align:right;font-weight:700;min-height:44px;display:flex;align-items:center;justify-content:flex-end}
    @media(max-width:480px){.thead,.row{grid-template-columns:1.2fr .9fr .9fr}.sum{width:130px}}
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:9999;padding:16px}
    .modal.show{display:flex}
    .dialog{background:#fff;border:1.5px solid #000;border-radius:8px;max-width:92vw;width:420px;padding:14px}
    .dialog h2{margin:0 0 8px;font-size:1.1rem}
    .dialog p{margin:0 0 12px}
    .dialog .actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
    .list{max-height:50vh;overflow:auto;margin:8px 0;border:1px solid #b7c4cf;border-radius:6px;background:#fafafa}
    .list button{display:block;width:100%;text-align:left;border:0;border-bottom:1px solid #b7c4cf;border-radius:0;background:#fff;padding:12px 14px}
    .list button:last-child{border-bottom:0}
  </style>
</head>
<body>
  <div class="app">
    <header><h1>Financial Record</h1></header>
    <div class="toolbar">
      <button id="newBtn">New list</button>
      <button id="saveBtn">Save list</button>
      <button id="loadBtn">Load list</button>
    </div>

    <div class="table" role="table" aria-label="Financial records">
      <div class="thead" role="row">
        <div class="cell" role="columnheader">Item/s</div>
        <div class="cell" role="columnheader">Date</div>
        <div class="cell" role="columnheader">Amount</div>
      </div>
      <div id="tbody" role="rowgroup"></div>
    </div>

    <div class="foot">
      <button id="addRow" aria-label="Add a row">+</button>
      <div class="sum" id="sumBox" aria-live="polite">0.00</div>
    </div>
  </div>

  <div id="confirmNew" class="modal" role="dialog" aria-modal="true" aria-labelledby="confirmNewTitle" style="display:none">
    <div class="dialog">
      <h2 id="confirmNewTitle">Start a new list?</h2>
      <p>This will clear all the data in the current displayed list. Do you want to proceed?</p>
      <div class="actions">
        <button id="cancelNew">Cancel</button>
        <button id="proceedNew">Proceed</button>
      </div>
    </div>
  </div>

  <div id="loadChooser" class="modal" role="dialog" aria-modal="true" aria-labelledby="loadChooserTitle" style="display:none">
    <div class="dialog">
      <h2 id="loadChooserTitle">Load a list</h2>
      <div id="listsContainer" class="list" aria-label="Saved lists"></div>
      <div class="actions">
        <button id="closeLoad">Close</button>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js');
      });
    }
    const fmtDate = (d=new Date()) => {
      const m=String(d.getMonth()+1).padStart(2,'0');
      const day=String(d.getDate()).padStart(2,'0');
      return `${d.getFullYear()}-${m}-${day}`;
    }
    const tbody = document.getElementById('tbody');
    const sumBox = document.getElementById('sumBox');

    function makeRow(rec={item:'', date:'', amount:''}){
      const row=document.createElement('div'); row.className='row';
      const cItem=document.createElement('div'); cItem.className='cell';
      const iItem=document.createElement('input'); iItem.type='text'; iItem.placeholder='Item name'; iItem.value=rec.item||''; cItem.appendChild(iItem);

      const cDate=document.createElement('div'); cDate.className='cell';
      const span=document.createElement('div'); span.className='date-text'; span.textContent=rec.date||''; cDate.appendChild(span);

      const cAmt=document.createElement('div'); cAmt.className='cell';
      const iAmt=document.createElement('input'); iAmt.type='number'; iAmt.inputMode='decimal'; iAmt.placeholder='0.00'; iAmt.step='0.01'; iAmt.min='0'; iAmt.value=rec.amount||''; cAmt.appendChild(iAmt);

      iAmt.addEventListener('input',()=>{ if(!span.textContent && iAmt.value.trim()!==''){ span.textContent = fmtDate(); } updateSum(); autosave();});
      iItem.addEventListener('input', autosave);

      row.append(cItem,cDate,cAmt);
      return row;
    }

    function addRows(n=1){ for(let i=0;i<n;i++){ tbody.appendChild(makeRow()); } updateSum(); }

    function getData(){
      return Array.from(tbody.querySelectorAll('.row')).map(r=>{
        const item = r.querySelector('input[type=text]').value.trim();
        const date = r.querySelector('.date-text').textContent.trim();
        const amount = r.querySelector('input[type=number]').value.trim();
        return {item, date, amount: amount? Number(parseFloat(amount).toFixed(2)).toFixed(2):''};
      }).filter(x=>x.item||x.amount||x.date);
    }

    function updateSum(){
      let total=0; tbody.querySelectorAll('input[type=number]').forEach(n=>{ const v=parseFloat(n.value); if(!isNaN(v)) total+=v; });
      sumBox.textContent = total.toFixed(2);
    }

    const P='finrec:list:'; const S='finrec:scratch';
    function saveList(){ const name=prompt('Save list as (name):'); if(!name) return; const data={name, savedAt:new Date().toISOString(), items:getData(), total:parseFloat(sumBox.textContent)}; try{ localStorage.setItem(P+name, JSON.stringify(data)); alert('Saved: '+name);}catch(e){ alert('Save failed: '+e); } }

    function showLoadChooser(){
      const box = document.getElementById('loadChooser');
      const container = document.getElementById('listsContainer');
      container.innerHTML = '';
      const keys = Object.keys(localStorage).filter(k=>k.startsWith(P));
      if(!keys.length){
        const empty = document.createElement('div');
        empty.style.padding='12px'; empty.textContent='No saved lists yet.';
        container.appendChild(empty);
      } else {
        keys.map(k=>k.slice(P.length)).sort((a,b)=>a.localeCompare(b)).forEach(name=>{
          const btn = document.createElement('button');
          btn.textContent = name;
          btn.addEventListener('click', ()=>{ loadListByName(name); hideModal(box); });
          container.appendChild(btn);
        });
      }
      showModal(box);
    }

    function loadListByName(name){
      const raw = localStorage.getItem(P+name);
      if(!raw){ alert('List not found.'); return; }
      try{
        const d = JSON.parse(raw);
        tbody.innerHTML='';
        (d.items||[]).forEach(rec=>tbody.appendChild(makeRow(rec)));
        ensureFive(); updateSum(); autosave();
      }catch(e){ alert('Could not load that list.'); }
    }

    function autosave(){ localStorage.setItem(S, JSON.stringify({items:getData()})); }
    function restore(){ const raw=localStorage.getItem(S); if(raw){ try{ const s=JSON.parse(raw); (s.items||[]).forEach(rec=>tbody.appendChild(makeRow(rec))); }catch(e){} } ensureFive(); updateSum(); }
    function ensureFive(){ const c=tbody.querySelectorAll('.row').length; if(c<5) addRows(5-c); }

    function showModal(el){ el.classList.add('show'); el.style.display='flex'; }
    function hideModal(el){ el.classList.remove('show'); el.style.display='none'; }

    function confirmNewList(){ showModal(document.getElementById('confirmNew')); }
    function proceedNewList(){ hideModal(document.getElementById('confirmNew')); tbody.innerHTML=''; ensureFive(); updateSum(); localStorage.removeItem(S); }

    document.getElementById('addRow').addEventListener('click',()=>{ tbody.appendChild(makeRow()); updateSum(); autosave(); });
    document.getElementById('saveBtn').addEventListener('click',saveList);
    document.getElementById('loadBtn').addEventListener('click',showLoadChooser);
    document.getElementById('newBtn').addEventListener('click',confirmNewList);

    document.getElementById('cancelNew').addEventListener('click',()=> hideModal(document.getElementById('confirmNew')));
    document.getElementById('proceedNew').addEventListener('click',proceedNewList);
    document.getElementById('closeLoad').addEventListener('click',()=> hideModal(document.getElementById('loadChooser')));

    restore();
  </script>
</body>
</html>
